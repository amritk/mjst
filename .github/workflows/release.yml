name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      # Last line of defense before publish: load every compiled module under
      # plain Node, run the CLI from dist/ end-to-end, and install packed
      # tarballs like an npm consumer, so a build or pack step that corrupts
      # the output (as tsc-alias did to generate-parsers v0.12.3) can never
      # ship to npm.
      - name: Smoke and e2e test built artifacts
        run: bun run test:dist

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: bun run release:version
          publish: bun run release:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
