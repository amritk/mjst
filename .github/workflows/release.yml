name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm

      # Don't use setup-node's `registry-url`: it writes an .npmrc carrying a
      # deprecated `always-auth` line (hence the "Unknown user config
      # always-auth" warnings) and a `//registry.npmjs.org/:_authToken=` line
      # fed by NODE_AUTH_TOKEN — which is empty here, since publishing goes
      # through trusted publishing (OIDC), not a token. That empty auth token
      # made changesets' "is this version already on npm?" pre-check read the
      # registry as an authenticated request and fail, so `changeset publish`
      # fell back to trying to republish every already-published package and the
      # run went red on "cannot publish over the previously published versions".
      # A clean registry-only .npmrc leaves those reads anonymous (public), so
      # the pre-check correctly skips packages already on npm; OIDC still
      # supplies auth at publish time.
      - name: Write a clean npmrc for trusted publishing
        run: echo "registry=https://registry.npmjs.org/" > "$HOME/.npmrc"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      # Last line of defense before publish: load every compiled module under
      # plain Node, run the CLI from dist/ end-to-end, and install packed
      # tarballs like an npm consumer, so a build or pack step that corrupts
      # the output (as tsc-alias did to generate-parsers v0.12.3) can never
      # ship to npm.
      - name: Smoke and e2e test built artifacts
        run: bun run test:dist

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: bun run release:version
          publish: bun run release:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
