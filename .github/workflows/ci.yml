name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run check

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      # Loads every compiled module under plain Node and runs the CLI from
      # dist/ — catches build-step corruption the src-aliased tests can't see
      # (v0.12.3 of generate-parsers shipped with an unparseable regex).
      - name: Smoke test built artifacts
        run: bun run test:dist
